name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :composeApp:assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: composeApp/build/outputs/apk/debug/*.apk

  desktop-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :composeApp:packageDeb
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-deb
          path: composeApp/build/compose/binaries/main/deb/*.deb

  desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :composeApp:packageMsi
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-msi
          path: composeApp/build/compose/binaries/main/msi/*.msi

  desktop-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :composeApp:packageDmg
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-dmg
          path: composeApp/build/compose/binaries/main/dmg/*.dmg

  web-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :composeApp:wasmJsBrowserDistribution
      - uses: actions/upload-artifact@v4
        with:
          name: web-wasm
          path: composeApp/build/dist/wasmJs/productionExecutable/

  web-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :composeApp:jsBrowserDistribution
      - uses: actions/upload-artifact@v4
        with:
          name: web-js
          path: composeApp/build/dist/js/productionExecutable/
